<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- VIEWPORT FIX: impede scroll horizontal no iPad/Safari -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>SignageOS — Player</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Garante que nada vaze para fora da tela */
    html, body {
      overflow: hidden !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* TAP TO START — tela de toque para Safari/iOS */
    #tapOverlay {
      position: fixed;
      inset: 0;
      background: #080808;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      cursor: pointer;
    }
    #tapOverlay.hidden { display: none; }

    .tap-logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #f0f0f0;
      letter-spacing: -0.02em;
    }
    .tap-logo em { font-style: normal; color: #555; }

    .tap-hint {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: blink 2s ease-in-out infinite;
    }

    .tap-circle {
      width: 80px; height: 80px;
      border: 1px solid #222;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #333;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); border-color: #222; }
      50% { transform: scale(1.08); border-color: #444; }
    }
  </style>
</head>
<body class="player-body">

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" style="position:fixed;inset:0;background:#080808;z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s ease;">
    <div style="font-family:Syne,sans-serif;font-size:24px;font-weight:800;color:#f0f0f0;">Signage<span style="color:#444">OS</span></div>
    <div style="font-family:DM Mono,monospace;font-size:11px;color:#444;letter-spacing:0.2em;animation:blink 1.5s ease infinite;">CONECTANDO...</div>
  </div>

  <!-- ══════════════════════════════════════════
       TAP TO START (Safari/iOS fix)
  ══════════════════════════════════════════ -->
  <div id="tapOverlay" class="hidden">
    <div class="tap-logo">Signage<em>OS</em></div>
    <div class="tap-circle">▶</div>
    <div class="tap-hint">Toque para iniciar</div>
  </div>

  <!-- ══════════════════════════════════════════
       STATUS BAR
  ══════════════════════════════════════════ -->
  <div id="statusBar" class="status-bar">
    <div class="status-left">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">AO VIVO</span>
    </div>
    <div class="status-center">
      <span id="clockDisplay"></span>
    </div>
    <div class="status-right">
      <span id="nextAdTimer"></span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       YOUTUBE WRAPPER
  ══════════════════════════════════════════ -->
  <div id="ytWrapper" class="yt-wrapper">
    <div id="ytPlayer"></div>
    <div id="ytOverlay" class="yt-overlay"></div>
  </div>

  <!-- ══════════════════════════════════════════
       AD PLAYER
  ══════════════════════════════════════════ -->
  <div id="adContainer" class="ad-container hidden">
    <video id="adVideo" class="ad-video" playsinline webkit-playsinline muted></video>

    <div class="ad-bar">
      <div class="ad-bar-left">
        <span class="ad-tag">ANÚNCIO</span>
        <span id="adTitle" class="ad-title-text"></span>
      </div>
      <div class="ad-bar-right">
        <div class="ad-progress-wrap">
          <div id="adProgressBar" class="ad-progress-fill"></div>
        </div>
        <span id="adCountdown" class="ad-countdown">0s</span>
      </div>
    </div>

    <button id="skipBtn" class="skip-btn hidden" onclick="SignagePlayer.skipAd()">
      PULAR <span>›</span>
    </button>
  </div>

  <!-- ══════════════════════════════════════════
       TRANSITION OVERLAY
  ══════════════════════════════════════════ -->
  <div id="transitionOverlay" class="transition-overlay"></div>

  <!-- ══════════════════════════════════════════
       TOAST
  ══════════════════════════════════════════ -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
